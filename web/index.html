<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RobBot</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #18222f;
      --muted: #5f6c7b;
      --brand: #1f6feb;
      --brand-ink: #ffffff;
      --ring: #bfd4ff;
      --border: #d7deea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 10% -10%, #dce9ff 0%, transparent 70%),
        radial-gradient(1200px 500px at 90% 110%, #e6fff6 0%, transparent 70%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .app {
      width: min(980px, 100%);
      height: min(86vh, 820px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 34px rgba(18, 39, 68, 0.12);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .topbar {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, #f8fbff);
    }
    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    #chat {
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: #eaf2ff;
      border-color: #c8d9ff;
    }
    .assistant {
      align-self: flex-start;
      background: #fbfdff;
    }
    .error {
      align-self: center;
      color: #8a1f2f;
      background: #ffeef1;
      border-color: #ffd3db;
    }
    .composer {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: #fff;
    }
    #input {
      width: 100%;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      color: var(--ink);
      outline: none;
    }
    #input:focus {
      border-color: #8eb5ff;
      box-shadow: 0 0 0 3px var(--ring);
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      font: inherit;
      font-weight: 600;
      background: var(--brand);
      color: var(--brand-ink);
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.55;
      cursor: default;
    }
    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      padding: 0 2px 2px;
    }
    @media (max-width: 760px) {
      .app {
        height: 92vh;
      }
      .msg {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">RobBot</h1>
      <p class="sub">Ask business-growth questions and shape your "King Of" strategy.</p>
    </header>

    <section id="chat"></section>

    <form id="form" class="composer">
      <div>
        <textarea id="input" required></textarea>
        <p class="hint">Press Enter to send. Shift+Enter for a new line.</p>
      </div>
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const history = [];
    let parlantSessionId = null;

    function appendMessage(role, text) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    appendMessage(
      "assistant",
      "Tell me a bit about your business and what feels stuck right now, and we can work through it together."
    );

    async function sendMessage(message) {
      sendBtn.disabled = true;
      input.disabled = true;

      appendMessage("user", message);
      const thinkingEl = appendMessage("assistant", "thinking...");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            history,
            parlant_session_id: parlantSessionId
          })
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          thinkingEl.remove();
          appendMessage("error", data.error || `Request failed (${res.status})`);
          return;
        }

        const reply = (data.reply || "").trim() || "No response generated.";
        if (data.parlant_session_id) {
          parlantSessionId = data.parlant_session_id;
        }
        thinkingEl.textContent = reply;
        history.push({ role: "user", content: message });
        history.push({ role: "assistant", content: reply });
      } catch (err) {
        thinkingEl.remove();
        appendMessage("error", `Network error: ${err}`);
      } finally {
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      await sendMessage(message);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
